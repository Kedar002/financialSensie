name: financesensei
description: "Personal Financial Operating System - Offline first"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Formatting
  intl: ^0.19.0

  # Database
  sqflite: ^2.4.2
  path: ^1.9.0
  uuid: ^4.5.1

  # Firebase
  firebase_core: ^3.13.0
  cloud_firestore: ^5.6.7

  # Location
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # Background Service (Android)
  flutter_background_service: ^5.1.0
  flutter_local_notifications: ^18.0.1

  # Map
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Battery
  battery_plus: ^6.2.1

  # Storage
  shared_preferences: ^2.5.3

  # Connectivity
  connectivity_plus: ^6.1.4

  # Permissions
  permission_handler: ^11.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/icon/app_icon.png"
  android_12:
    color: "#FFFFFF"
    image: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/icon/
